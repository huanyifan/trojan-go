name: Build Trojan-Go

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: "Go 版本"
        required: true
        default: "1.22"
        type: choice
        options:
          - "1.22"
          - "1.23"
      upload_artifact:
        description: "上传为 Artifact"
        required: true
        default: true
        type: boolean

  push:
    branches:
      - master
      - dev
    tags:
      - "v*"

  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    name: 编译 ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            assetname: linux-64
          - goos: linux
            goarch: "386"
            assetname: linux-32
          - goos: linux
            goarch: arm64
            assetname: linux-arm64-v8a
          - goos: linux
            goarch: arm
            goarm: "7"
            assetname: linux-armv7l
          - goos: linux
            goarch: arm
            goarm: "6"
            assetname: linux-armv6l
          - goos: linux
            goarch: arm
            goarm: "5"
            assetname: linux-armv5l
          - goos: linux
            goarch: riscv64
            assetname: linux-riscv64
          - goos: linux
            goarch: mips64
            assetname: linux-mips64
          - goos: linux
            goarch: mips64le
            assetname: linux-mips64le
          - goos: linux
            goarch: mips
            gomips: softfloat
            assetname: linux-mips-softfloat
          - goos: linux
            goarch: mips
            gomips: hardfloat
            assetname: linux-mips-hardfloat
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            assetname: linux-mipsle-softfloat
          - goos: linux
            goarch: mipsle
            gomips: hardfloat
            assetname: linux-mipsle-hardfloat
          - goos: darwin
            goarch: amd64
            assetname: macos-64
          - goos: darwin
            goarch: arm64
            assetname: macos-arm64
          - goos: windows
            goarch: amd64
            assetname: windows-64
          - goos: windows
            goarch: "386"
            assetname: windows-32
          - goos: windows
            goarch: arm64
            assetname: windows-arm64
          - goos: freebsd
            goarch: amd64
            assetname: freebsd-64
          - goos: freebsd
            goarch: "386"
            assetname: freebsd-32
          - goos: freebsd
            goarch: arm64
            assetname: freebsd-arm64
          - goos: openbsd
            goarch: amd64
            assetname: openbsd-64
          - goos: openbsd
            goarch: arm64
            assetname: openbsd-arm64

    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version || '1.22' }}
          check-latest: true

      - name: Download deps
        run: go mod download

      - name: Build
        run: |
          BUILD_DIR="build/${{ matrix.assetname }}"
          mkdir -p "$BUILD_DIR"
          PACKAGE="github.com/p4gefau1t/trojan-go"
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA::8}"
          go build -tags "full" \
            -trimpath \
            -ldflags="-s -w -X $PACKAGE/constant.Version=$VERSION -X $PACKAGE/constant.Commit=$COMMIT" \
            -o "$BUILD_DIR/trojan-go${{ matrix.goos == 'windows' && '.exe' || '' }}" .

      - name: Package
        run: |
          BUILD_DIR="build/${{ matrix.assetname }}"
          PKG_NAME="trojan-go-${{ matrix.assetname }}"
          cp README.md LICENSE "$BUILD_DIR/"
          cd "$BUILD_DIR"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a -tzip "../${PKG_NAME}.zip" ./*
          else
            tar czf "../${PKG_NAME}.tar.gz" ./*
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trojan-go-${{ matrix.assetname }}
          path: ./trojan-go-${{ matrix.assetname }}.*

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./trojan-go-${{ matrix.assetname }}.*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
          prerelease: true
