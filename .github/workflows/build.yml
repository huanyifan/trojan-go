name: Build Trojan-Go

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: "Go 版本"
        required: true
        default: "1.22"
        type: choice
        options:
          - "1.22"
          - "1.23"
      upload_artifact:
        description: "上传为 Artifact"
        required: true
        default: true
        type: boolean

  push:
    branches:
      - master
      - dev
    tags:
      - "v*"

  pull_request:
    branches:
      - master
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ======== Linux ========
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: "386"
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "6"
            ext: ""
          - goos: linux
            goarch: arm
            goarm: "5"
            ext: ""
          - goos: linux
            goarch: mips64
            ext: ""
          - goos: linux
            goarch: mips64le
            ext: ""
          - goos: linux
            goarch: mips
            gomips: softfloat
            ext: ""
          - goos: linux
            goarch: mips
            gomips: hardfloat
            ext: ""
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            ext: ""
          - goos: linux
            goarch: mipsle
            gomips: hardfloat
            ext: ""
          # ======== macOS ========
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          # ======== Windows ========
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: "386"
            ext: ".exe"
          # ======== FreeBSD ========
          - goos: freebsd
            goarch: amd64
            ext: ""
          - goos: freebsd
            goarch: "386"
            ext: ""
          - goos: freebsd
            goarch: arm64
            ext: ""
          # ======== OpenBSD ========
          - goos: openbsd
            goarch: amd64
            ext: ""
          - goos: openbsd
            goarch: arm64
            ext: ""

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      GOMIPS: ${{ matrix.gomips }}
      CGO_ENABLED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version || '1.22' }}
          check-latest: true

      - name: Download deps
        run: go mod download

      - name: Build
        run: |
          ASSET="trojan-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-arm{0}', matrix.goarm) || '' }}${{ matrix.gomips && format('-{0}', matrix.gomips) || '' }}"
          echo "ASSET=$ASSET" >> $GITHUB_ENV
          BUILD_DIR="build/$ASSET"
          mkdir -p "$BUILD_DIR"
          PACKAGE="github.com/p4gefau1t/trojan-go"
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA::8}"
          go build -tags "full" \
            -trimpath \
            -ldflags="-s -w -X $PACKAGE/constant.Version=$VERSION -X $PACKAGE/constant.Commit=$COMMIT" \
            -o "$BUILD_DIR/trojan-go${{ matrix.ext }}" .

      - name: Package
        run: |
          BUILD_DIR="build/${{ env.ASSET }}"
          PKG_NAME="${{ env.ASSET }}"
          cp README.md LICENSE "$BUILD_DIR/"
          cd "$BUILD_DIR"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a -tzip "../${PKG_NAME}.zip" ./*
          else
            tar czf "../${PKG_NAME}.tar.gz" ./*
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ./${{ env.ASSET }}.*

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./${{ env.ASSET }}.*
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
          prerelease: true
